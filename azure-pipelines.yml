trigger: none

# ── Scheduled nightly run (weekdays 02:00 UTC) ──
schedules:
  - cron: "0 2 * * 1-5"
    displayName: "Nightly regression (demo)"
    branches:
      include: [main]
    always: false  # only if code changed

parameters:
  - name: demoMode
    displayName: "Demo mode (generate sample report without VPX deployment)"
    type: boolean
    default: true
  - name: skipDeploy
    displayName: "Skip VPX deployment (reuse already-running VMs)"
    type: boolean
    default: false
  - name: baselineTarball
    displayName: "Baseline firmware tarball path"
    type: string
    default: "/home/aeonadmin/Downloads/vpx/NSVPX-KVM-14.1-56.74_nc_64.tgz"
  - name: candidateTarball
    displayName: "Candidate firmware tarball path"
    type: string
    default: "/home/aeonadmin/Downloads/vpx/NSVPX-KVM-14.1-60.57_nc_64.tgz"

# ── Variable group for shared secrets ──
variables:
  - group: vpx-secrets
  - name: VM_STORAGE_DIR
    value: /home/vm-data
  - name: BASELINE_NAME
    value: vpx-baseline
  - name: CANDIDATE_NAME
    value: vpx-candidate
  - name: BASELINE_IP
    value: 10.0.1.5
  - name: CANDIDATE_IP
    value: 10.0.1.6
  - name: BOOT_TIMEOUT
    value: "180"
  - name: CERT_DIR
    value: /tmp/vpx-pipeline-certs

stages:
  # ================================================================
  # Stage 1: Setup
  # ================================================================
  - stage: Setup
    displayName: "Phase 1: Setup"
    jobs:
      - job: Setup
        displayName: "Validate Environment"
        pool: Default
        steps:
          - checkout: self

          - task: Bash@3
            displayName: "Validate prerequisites"
            inputs:
              targetType: inline
              script: |
                SECONDS=0
                echo "╔══════════════════════════════════════════════════════╗"
                echo "║  VPX Firmware Regression Pipeline                    ║"
                echo "║  Mode: ${{ parameters.demoMode }}                    ║"
                echo "║  Skip Deploy: ${{ parameters.skipDeploy }}           ║"
                echo "║  Agent: $(Agent.MachineName)                         ║"
                echo "║  Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')        ║"
                echo "╚══════════════════════════════════════════════════════╝"
                echo ""
                echo "Checking required tools..."
                if [ "${{ parameters.demoMode }}" = "True" ]; then
                  echo "  [DEMO MODE] Skipping KVM tool checks"
                  for TOOL in python3 curl; do
                    if command -v "$TOOL" &>/dev/null; then
                      echo "  [OK] $TOOL ($(command -v "$TOOL"))"
                    else
                      echo "  [FAIL] $TOOL not found"
                      exit 1
                    fi
                  done
                else
                  for TOOL in virsh mkisofs expect qemu-img terraform curl; do
                    if command -v "$TOOL" &>/dev/null; then
                      echo "  [OK] $TOOL ($(command -v "$TOOL"))"
                    else
                      echo "  [FAIL] $TOOL not found"
                      exit 1
                    fi
                  done
                  echo ""
                  echo "Terraform version:"
                  terraform version
                  echo ""
                  echo "Checking VM storage directory..."
                  df -h $(VM_STORAGE_DIR)
                  echo "Checking network..."
                  sudo virsh net-info opn_wan
                fi
                echo ""
                echo "##[section]Setup completed in ${SECONDS}s"

          - task: Bash@3
            displayName: "Check if VPXs are already running"
            condition: and(eq('${{ parameters.demoMode }}', 'False'), eq('${{ parameters.skipDeploy }}', 'True'))
            inputs:
              targetType: inline
              script: |
                echo "Checking if VPX instances are already deployed..."
                FAIL=0
                for VPX_IP in "$(BASELINE_IP)" "$(CANDIDATE_IP)"; do
                  HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
                    -u "nsroot:$NSROOT_PASSWORD" \
                    "https://${VPX_IP}/nitro/v1/config/nsversion" 2>/dev/null || echo "000")
                  if [[ "$HTTP_CODE" == "200" ]]; then
                    VERSION=$(curl -sk -u "nsroot:$NSROOT_PASSWORD" \
                      "https://${VPX_IP}/nitro/v1/config/nsversion" 2>/dev/null \
                      | python3 -c "import sys,json; print(json.load(sys.stdin)['nsversion']['version'])" 2>/dev/null || echo "unknown")
                    echo "  [OK] $VPX_IP — running ($VERSION)"
                  else
                    echo "  [FAIL] $VPX_IP — not reachable (HTTP $HTTP_CODE)"
                    FAIL=1
                  fi
                done
                if [[ "$FAIL" == "1" ]]; then
                  echo ""
                  echo "##[error]skipDeploy=true but one or more VPXs are not reachable. Disable skipDeploy to provision new VMs."
                  exit 1
                fi
                echo ""
                echo "Both VPXs are running — skipping VM provisioning."
            env:
              NSROOT_PASSWORD: $(NSROOT_PASSWORD)

          - task: Bash@3
            displayName: "Clean up leftover VMs from previous runs"
            condition: and(eq('${{ parameters.demoMode }}', 'False'), eq('${{ parameters.skipDeploy }}', 'False'))
            inputs:
              targetType: inline
              script: |
                scripts/cleanup-vm.sh "$(BASELINE_NAME)" "$(VM_STORAGE_DIR)"
                scripts/cleanup-vm.sh "$(CANDIDATE_NAME)" "$(VM_STORAGE_DIR)"

          - task: Bash@3
            displayName: "Decode SSL certificates"
            condition: eq('${{ parameters.demoMode }}', 'False')
            inputs:
              targetType: inline
              script: |
                rm -rf "$(CERT_DIR)"
                mkdir -p "$(CERT_DIR)"
                echo "$LAB_CA_CRT" | base64 -d > "$(CERT_DIR)/lab-ca.crt"
                echo "$WILDCARD_CRT" | base64 -d > "$(CERT_DIR)/wildcard.lab.local.crt"
                echo "$WILDCARD_KEY" | base64 -d > "$(CERT_DIR)/wildcard.lab.local.key"
                echo "Certificates decoded to $(CERT_DIR)"
                ls -la "$(CERT_DIR)/"
            env:
              LAB_CA_CRT: $(LAB_CA_CRT)
              WILDCARD_CRT: $(WILDCARD_CRT)
              WILDCARD_KEY: $(WILDCARD_KEY)

  # ================================================================
  # Stage 2a: Provision Baseline VPX VM (KVM only — no Terraform)
  # ================================================================
  - stage: ProvisionBaseline
    displayName: "Phase 2a: Provision Baseline VM"
    dependsOn: Setup
    condition: and(succeeded(), eq('${{ parameters.demoMode }}', 'False'), eq('${{ parameters.skipDeploy }}', 'False'))
    jobs:
      - job: Provision
        displayName: "KVM: Baseline (14.1-56.74)"
        pool: Default
        timeoutInMinutes: 15
        steps:
          - checkout: self

          - task: Bash@3
            displayName: "Provision VPX VM on KVM"
            inputs:
              targetType: inline
              script: |
                SECONDS=0
                scripts/provision-vpx.sh \
                  --name "$(BASELINE_NAME)" \
                  --tarball "${{ parameters.baselineTarball }}" \
                  --ip "$(BASELINE_IP)" \
                  --password "$NSROOT_PASSWORD" \
                  --storage-dir "$(VM_STORAGE_DIR)" \
                  --boot-timeout "$(BOOT_TIMEOUT)"
                echo "##[section]Baseline VM provisioned in ${SECONDS}s"
            env:
              NSROOT_PASSWORD: $(NSROOT_PASSWORD)

  # ================================================================
  # Stage 2b: Provision Candidate VPX VM (KVM only — no Terraform)
  # ================================================================
  - stage: ProvisionCandidate
    displayName: "Phase 2b: Provision Candidate VM"
    dependsOn: Setup
    condition: and(succeeded(), eq('${{ parameters.demoMode }}', 'False'), eq('${{ parameters.skipDeploy }}', 'False'))
    jobs:
      - job: Provision
        displayName: "KVM: Candidate (14.1-60.57)"
        pool: Default
        timeoutInMinutes: 15
        steps:
          - checkout: self

          - task: Bash@3
            displayName: "Provision VPX VM on KVM"
            inputs:
              targetType: inline
              script: |
                SECONDS=0
                scripts/provision-vpx.sh \
                  --name "$(CANDIDATE_NAME)" \
                  --tarball "${{ parameters.candidateTarball }}" \
                  --ip "$(CANDIDATE_IP)" \
                  --password "$NSROOT_PASSWORD" \
                  --storage-dir "$(VM_STORAGE_DIR)" \
                  --boot-timeout "$(BOOT_TIMEOUT)"
                echo "##[section]Candidate VM provisioned in ${SECONDS}s"
            env:
              NSROOT_PASSWORD: $(NSROOT_PASSWORD)

  # ================================================================
  # Stage 3a: Configure Baseline via Terraform
  # ================================================================
  - stage: ConfigureBaseline
    displayName: "Phase 3a: Configure Baseline (Terraform)"
    dependsOn:
      - Setup
      - ProvisionBaseline
    condition: |
      and(
        succeeded('Setup'),
        eq('${{ parameters.demoMode }}', 'False'),
        or(
          succeeded('ProvisionBaseline'),
          eq('${{ parameters.skipDeploy }}', 'True')
        )
      )
    jobs:
      - job: Configure
        displayName: "Terraform: Baseline"
        pool: Default
        timeoutInMinutes: 20
        steps:
          - checkout: self

          - task: Bash@3
            displayName: "Apply Terraform configuration"
            inputs:
              targetType: inline
              script: |
                SECONDS=0
                scripts/configure-vpx.sh \
                  --name "$(BASELINE_NAME)" \
                  --ip "$(BASELINE_IP)" \
                  --password "$NSROOT_PASSWORD" \
                  --rpc-password "$RPC_PASSWORD" \
                  --cert-dir "$(CERT_DIR)" \
                  --tfvars baseline.tfvars \
                  --state baseline.tfstate \
                  --boot-timeout "$(BOOT_TIMEOUT)"
                echo "##[section]Baseline configured in ${SECONDS}s"
            env:
              NSROOT_PASSWORD: $(NSROOT_PASSWORD)
              RPC_PASSWORD: $(RPC_PASSWORD)

  # ================================================================
  # Stage 3b: Configure Candidate via Terraform
  # ================================================================
  - stage: ConfigureCandidate
    displayName: "Phase 3b: Configure Candidate (Terraform)"
    dependsOn:
      - Setup
      - ProvisionCandidate
    condition: |
      and(
        succeeded('Setup'),
        eq('${{ parameters.demoMode }}', 'False'),
        or(
          succeeded('ProvisionCandidate'),
          eq('${{ parameters.skipDeploy }}', 'True')
        )
      )
    jobs:
      - job: Configure
        displayName: "Terraform: Candidate"
        pool: Default
        timeoutInMinutes: 20
        steps:
          - checkout: self

          - task: Bash@3
            displayName: "Apply Terraform configuration"
            inputs:
              targetType: inline
              script: |
                SECONDS=0
                scripts/configure-vpx.sh \
                  --name "$(CANDIDATE_NAME)" \
                  --ip "$(CANDIDATE_IP)" \
                  --password "$NSROOT_PASSWORD" \
                  --rpc-password "$RPC_PASSWORD" \
                  --cert-dir "$(CERT_DIR)" \
                  --tfvars candidate.tfvars \
                  --state candidate.tfstate \
                  --boot-timeout "$(BOOT_TIMEOUT)"
                echo "##[section]Candidate configured in ${SECONDS}s"
            env:
              NSROOT_PASSWORD: $(NSROOT_PASSWORD)
              RPC_PASSWORD: $(RPC_PASSWORD)

  # ================================================================
  # Stage 4: Regression Tests
  # ================================================================
  - stage: RegressionTest
    displayName: "Phase 4: Regression Tests"
    dependsOn:
      - ConfigureBaseline
      - ConfigureCandidate
    condition: |
      or(
        and(
          eq('${{ parameters.demoMode }}', 'False'),
          succeeded()
        ),
        eq('${{ parameters.demoMode }}', 'True')
      )
    jobs:
      - job: Test
        displayName: "Compare Firmware Outputs"
        pool: Default
        timeoutInMinutes: 10
        steps:
          - checkout: self

          # --- DEMO MODE: Generate sample data + report ---
          - task: Bash@3
            displayName: "[Demo] Generate sample test data"
            condition: eq('${{ parameters.demoMode }}', 'True')
            inputs:
              targetType: inline
              script: |
                SECONDS=0
                echo "╔══════════════════════════════════════════════════════════╗"
                echo "║  DEMO MODE — Generating sample regression data          ║"
                echo "║  In production, this stage runs NITRO API tests against  ║"
                echo "║  two live VPX instances deployed in Stage 2.             ║"
                echo "╚══════════════════════════════════════════════════════════╝"
                echo ""
                python3 scripts/generate-sample-data.py "$(Build.ArtifactStagingDirectory)/regression-output"
                echo "##[section]Sample data generated in ${SECONDS}s"

          - task: Bash@3
            displayName: "[Demo] Generate HTML report"
            condition: eq('${{ parameters.demoMode }}', 'True')
            inputs:
              targetType: inline
              script: |
                SECONDS=0
                OUT="$(Build.ArtifactStagingDirectory)/regression-output"
                python3 scripts/generate-html-report.py \
                  "$OUT/baseline.json" \
                  "$OUT/candidate.json" \
                  "$OUT" \
                  "$OUT" \
                  "$OUT/logs" \
                  "$OUT/metrics.csv"
                echo ""
                echo "Report generated:"
                ls -lh "$OUT/regression-report.html"
                echo "##[section]HTML report generated in ${SECONDS}s"

          # --- LIVE MODE: Run real tests against VPX instances ---
          - task: Bash@3
            displayName: "Run regression comparison"
            condition: eq('${{ parameters.demoMode }}', 'False')
            inputs:
              targetType: inline
              script: |
                SECONDS=0
                scripts/run-regression-tests.sh \
                  "$(BASELINE_IP)" "$(CANDIDATE_IP)" "$NSROOT_PASSWORD" "$(Build.ArtifactStagingDirectory)/regression-output"
                echo "##[section]Regression tests completed in ${SECONDS}s"
            env:
              NSROOT_PASSWORD: $(NSROOT_PASSWORD)

          # --- JUnit XML for Azure DevOps Tests tab ---
          - task: Bash@3
            displayName: "Generate JUnit test results"
            condition: always()
            inputs:
              targetType: inline
              script: |
                OUT="$(Build.ArtifactStagingDirectory)/regression-output"
                python3 scripts/generate-junit-report.py \
                  "$OUT/baseline.json" \
                  "$OUT/candidate.json" \
                  "$OUT/junit"

          - task: PublishTestResults@2
            displayName: "Publish test results to Tests tab"
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "$(Build.ArtifactStagingDirectory)/regression-output/junit/*.xml"
              mergeTestResults: true
              testRunTitle: "VPX Firmware Regression — $(Build.BuildNumber)"
              failTaskOnFailedTests: true

          # --- Publish HTML report as artifact ---
          - task: PublishBuildArtifacts@1
            displayName: "Publish regression report"
            condition: always()
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/regression-output
              artifactName: regression-report
              publishLocation: Container

          # --- Pipeline summary ---
          - task: Bash@3
            displayName: "Pipeline summary"
            condition: always()
            inputs:
              targetType: inline
              script: |
                OUT="$(Build.ArtifactStagingDirectory)/regression-output"
                echo ""
                echo "╔══════════════════════════════════════════════════════╗"
                echo "║  PIPELINE SUMMARY                                    ║"
                echo "╚══════════════════════════════════════════════════════╝"
                if [ -f "$OUT/baseline.json" ]; then
                  python3 -c "
                import json
                b = json.load(open('$OUT/baseline.json'))
                c = json.load(open('$OUT/candidate.json'))
                total = b['total'] + c['total']
                passed = b['passed'] + c['passed']
                failed = b['failed'] + c['failed']
                warns = b.get('warnings', 0) + c.get('warnings', 0)
                print(f'  Baseline:  {b[\"total\"]} tests ({b[\"passed\"]}P / {b[\"failed\"]}F / {b.get(\"warnings\",0)}W) — {b.get(\"nsip\",\"?\")}')
                print(f'  Candidate: {c[\"total\"]} tests ({c[\"passed\"]}P / {c[\"failed\"]}F / {c.get(\"warnings\",0)}W) — {c.get(\"nsip\",\"?\")}')
                print(f'  ─────────────────────────────────────────')
                print(f'  Total:     {total} assertions, {passed} passed, {failed} failed, {warns} warnings')
                print(f'  Result:    {\"PASS ✓\" if failed == 0 else \"FAIL ✗\"} ')
                "
                fi
                echo ""
                if [ -f "$OUT/regression-report.html" ]; then
                  SIZE=$(du -h "$OUT/regression-report.html" | cut -f1)
                  echo "  Report:    regression-report.html ($SIZE)"
                fi
                echo "  Build:     $(Build.BuildNumber)"
                echo "  Agent:     $(Agent.MachineName)"
                echo "  Finished:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  # Cleanup stage removed — VMs are kept alive after pipeline for manual inspection.
  # To clean up manually: scripts/cleanup-vm.sh vpx-baseline /home/vm-data
  #                        scripts/cleanup-vm.sh vpx-candidate /home/vm-data
